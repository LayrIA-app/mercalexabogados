  <body>
    <div id="root"></div>
    <script src="/chat.js" defer></script>
  <script>(function() {
  let messages = [];
  let isOpen = false;
  let userMessageCount = 0;

  const styles = `
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600&display=swap');

    #lex-chat-button {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 9999;
      width: 56px;
      height: 56px;
      background: linear-gradient(45deg, #E8621A, #D42B2B, #1AB3D4, #8DC63F, #F5C800, #E8621A);
      background-size: 400% 400%;
      animation: gradient-shift 6s linear infinite;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(26,179,212,0.4);
      transition: box-shadow 0.3s ease;
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    #lex-chat-button:hover {
      box-shadow: 0 12px 40px rgba(26,179,212,0.6);
    }

    #lex-chat-button.exploding .lex-square {
      animation: none !important;
    }

    #lex-chat-button.exploding .lex-square-1 {
      background: #E8621A;
      animation: explode1 0.5s cubic-bezier(0.16,1,0.3,1) forwards !important;
    }

    #lex-chat-button.exploding .lex-square-2 {
      background: #D42B2B;
      animation: explode2 0.5s cubic-bezier(0.16,1,0.3,1) forwards !important;
    }

    #lex-chat-button.exploding .lex-square-3 {
      background: #8DC63F;
      animation: explode3 0.5s cubic-bezier(0.16,1,0.3,1) forwards !important;
    }

    #lex-chat-button.exploding .lex-square-4 {
      background: #F5C800;
      animation: explode4 0.5s cubic-bezier(0.16,1,0.3,1) forwards !important;
    }

    .lex-square {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #FFFFFF;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .lex-square-1 {
      animation: float1 2.8s ease-in-out infinite alternate;
    }
    .lex-square-2 {
      animation: float2 3.4s ease-in-out infinite alternate;
    }
    .lex-square-3 {
      animation: float3 2.2s ease-in-out infinite alternate;
    }
    .lex-square-4 {
      animation: float4 3.8s ease-in-out infinite alternate;
    }

    @keyframes float1 {
      0% { transform: translate(-50%, -50%) translateX(-8px) translateY(-6px); }
      100% { transform: translate(-50%, -50%) translateX(9px) translateY(7px); }
    }

    @keyframes float2 {
      0% { transform: translate(-50%, -50%) translateX(7px) translateY(-9px); }
      100% { transform: translate(-50%, -50%) translateX(-6px) translateY(10px); }
    }

    @keyframes float3 {
      0% { transform: translate(-50%, -50%) translateX(-10px) translateY(5px); }
      100% { transform: translate(-50%, -50%) translateX(8px) translateY(-7px); }
    }

    @keyframes float4 {
      0% { transform: translate(-50%, -50%) translateX(9px) translateY(8px); }
      100% { transform: translate(-50%, -50%) translateX(-7px) translateY(-6px); }
    }

    @keyframes explode1 {
      0% { transform: translate(-50%, -50%) translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(-60px) translateY(-60px) rotate(360deg); opacity: 0; }
    }

    @keyframes explode2 {
      0% { transform: translate(-50%, -50%) translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(60px) translateY(-60px) rotate(360deg); opacity: 0; }
    }

    @keyframes explode3 {
      0% { transform: translate(-50%, -50%) translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(-60px) translateY(60px) rotate(360deg); opacity: 0; }
    }

    @keyframes explode4 {
      0% { transform: translate(-50%, -50%) translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(60px) translateY(60px) rotate(360deg); opacity: 0; }
    }

    #lex-chat-window {
      position: fixed;
      bottom: 100px;
      right: 32px;
      width: 380px;
      height: 540px;
      background: #F8F8F8;
      border: 1px solid rgba(201,168,76,0.3);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      z-index: 999;
      display: none;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      border-radius: 16px;
      overflow: hidden;
    }

    #lex-chat-window.open {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    .lex-header {
      background: #111111;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lex-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lex-header-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8621A, #D42B2B, #1AB3D4, #8DC63F, #F5C800);
      background-size: 400% 400%;
      animation: gradientAvatar 6s linear infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #C9A84C;
      font-size: 16px;
    }

    @keyframes gradientAvatar {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .lex-header-text h3 {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 16px;
      margin: 0;
    }

    .lex-header-text p {
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      margin: 2px 0 0 0;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lex-status-dot {
      width: 6px;
      height: 6px;
      background: #8DC63F;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .lex-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      line-height: 1;
    }

    .lex-close:hover {
      color: white;
    }

    .lex-gradient-line {
      height: 3px;
      background: linear-gradient(90deg, #E8621A, #D42B2B, #1AB3D4, #8DC63F, #F5C800);
    }

    .lex-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #F8F8F8;
    }

    .lex-messages::-webkit-scrollbar {
      width: 6px;
    }

    .lex-messages::-webkit-scrollbar-track {
      background: #111111;
    }

    .lex-messages::-webkit-scrollbar-thumb {
      background: #C9A84C;
      border-radius: 3px;
    }

    .lex-message {
      margin-bottom: 16px;
    }

    .lex-message-assistant {
      background: #EEEEEE;
      color: #111111;
      border-left: 2px solid #C9A84C;
      padding: 12px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      max-width: 85%;
    }

    .lex-message-user {
      background: #C9A84C;
      color: #0A0A0A;
      padding: 12px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      max-width: 85%;
      margin-left: auto;
    }

    .lex-typing {
      background: #EEEEEE;
      border-left: 2px solid #C9A84C;
      padding: 12px 16px;
      max-width: 85%;
      display: none;
    }

    .lex-typing.active {
      display: block;
    }

    .lex-typing-dots {
      display: flex;
      gap: 4px;
    }

    .lex-typing-dot {
      width: 8px;
      height: 8px;
      background: #C9A84C;
      border-radius: 50%;
      animation: typingDot 1.4s infinite;
    }

    .lex-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .lex-typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    .lex-input-area {
      background: #111111;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0;
    }

    .lex-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      padding: 16px;
      outline: none;
    }

    .lex-input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .lex-send {
      width: 40px;
      height: 40px;
      background: #C9A84C;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
      flex-shrink: 0;
      border-radius: 10px;
    }

    .lex-send:hover {
      background: #D4B55E;
    }

    .lex-send svg {
      width: 16px;
      height: 16px;
    }

    .lex-footer {
      background: #F8F8F8;
      padding: 12px 20px;
      text-align: center;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .lex-footer-btn {
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: #C9A84C;
      cursor: pointer;
      text-decoration: underline;
      transition: opacity 0.2s ease;
    }

    .lex-footer-btn:hover {
      opacity: 0.7;
    }

    .lex-session-complete {
      background: #F8F8F8;
      padding: 16px 20px;
      text-align: center;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .lex-session-complete p {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      color: #111111;
      margin: 0 0 12px 0;
      line-height: 1.5;
    }

    .lex-reserve-btn {
      background: #C9A84C;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: #0A0A0A;
      cursor: pointer;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .lex-reserve-btn:hover {
      background: #D4B55E;
      transform: translateY(-2px);
    }

    .lex-input:disabled {
      background: rgba(0,0,0,0.05);
      cursor: not-allowed;
    }
  `;

  const styleSheet = document.createElement('style');
  styleSheet.textContent = styles;
  document.head.appendChild(styleSheet);

  const chatButton = document.createElement('button');
  chatButton.id = 'lex-chat-button';
  chatButton.innerHTML = `
    <div class="lex-square lex-square-1"></div>
    <div class="lex-square lex-square-2"></div>
    <div class="lex-square lex-square-3"></div>
    <div class="lex-square lex-square-4"></div>
  `;

  const chatWindow = document.createElement('div');
  chatWindow.id = 'lex-chat-window';
  chatWindow.innerHTML = `
    <div class="lex-header">
      <div class="lex-header-left">
        <div class="lex-header-logo"></div>
        <div class="lex-header-text">
          <h3>Lex IA</h3>
          <p><span class="lex-status-dot"></span>MercaLex Abogados</p>
        </div>
      </div>
      <button class="lex-close">×</button>
    </div>
    <div class="lex-gradient-line"></div>
    <div class="lex-messages" id="lex-messages"></div>
    <div class="lex-typing" id="lex-typing">
      <div class="lex-typing-dots">
        <div class="lex-typing-dot"></div>
        <div class="lex-typing-dot"></div>
        <div class="lex-typing-dot"></div>
      </div>
    </div>
    <div class="lex-input-area">
      <input type="text" class="lex-input" id="lex-input" placeholder="Escribe tu consulta legal...">
      <button class="lex-send" id="lex-send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
    <div class="lex-footer">
      <button class="lex-footer-btn" id="lex-footer-call">Primera consulta gratuita — Reserva una cita</button>
    </div>
  `;

  document.body.appendChild(chatButton);
  document.body.appendChild(chatWindow);

  const messagesContainer = document.getElementById('lex-messages');
  const input = document.getElementById('lex-input');
  const sendBtn = document.getElementById('lex-send');
  const closeBtn = chatWindow.querySelector('.lex-close');
  const typingIndicator = document.getElementById('lex-typing');
  const footerCall = document.getElementById('lex-footer-call');

  function getRandomWelcomeMessage() {
    const messages = [
      'Hola, soy Lex IA. ¿En qué puedo ayudarte hoy?',
      'Buenos días. Soy Lex IA, del equipo de MercaLex. ¿Cómo puedo ayudarte?',
      'Hola. Soy Lex IA. Cuéntame tu situación y vemos cómo ayudarte.',
      'Bienvenido. Soy Lex IA — estoy aquí para orientarte. ¿Qué necesitas?',
      'Hola, soy Lex IA. Dime en qué puedo ayudarte.',
      'Buenos días. Soy Lex IA, de MercaLex. ¿En qué puedo orientarte hoy?',
      'Hola. Soy Lex IA. Cuéntame con confianza, estamos aquí para ayudarte.',
      'Bienvenido a MercaLex. Soy Lex IA — ¿cómo puedo asistirte?'
    ];
    return messages[Math.floor(Math.random() * messages.length)];
  }

  function toggleChat() {
    if (!isOpen) {
      chatButton.classList.add('exploding');

      setTimeout(() => {
        isOpen = true;
        chatWindow.classList.add('open');
        chatButton.classList.remove('exploding');

        if (messages.length === 0) {
          addMessage('assistant', getRandomWelcomeMessage());
        }
      }, 500);
    } else {
      isOpen = false;
      chatWindow.classList.remove('open');
    }
  }

  function addMessage(role, content) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `lex-message lex-message-${role}`;
    messageDiv.textContent = content;
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;

    messages.push({ role, content });
  }

  async function sendMessage() {
    const userMessage = input.value.trim();
    if (!userMessage) return;

    addMessage('user', userMessage);
    input.value = '';
    userMessageCount++;

    typingIndicator.classList.add('active');

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          system: `Eres Lex IA, el asistente legal digital de MercaLex Abogados. Formas parte del equipo del despacho. No eres un bot genérico: conoces MercaLex en profundidad y actúas como un abogado experto y consultor de confianza.

TONO: profesional, directo, cercano. Siempre de tú, nunca de usted. Estilo consultor enterprise: sin rodeos, sin relleno, con criterio. Nunca condescendiente.

SOBRE MERCALEX:
Despacho fundado en 2011, especializado en recobro y prevención de morosidad en Mercamadrid. Ubicado en Mercamadrid Internacional, Zona Comercial Local C-D4, 28053 Madrid. También en C/ Príncipe de Vergara 8, 2ª Planta, 28001 Madrid. Tel: +34 91 173 36 03. Email: info@mercalexabogados.com. Atención desde las 07:00h de lunes a viernes. Más de 15 años de experiencia, 60+ clientes activos entre mayoristas, asentadores y productores de Mercamadrid.

ÁREAS DE ESPECIALIZACIÓN (solo informa si te preguntan, nunca de forma proactiva):
1. Derecho Civil: responsabilidad civil contractual y extracontractual, sucesiones y herencias, división judicial, reclamaciones de cantidad, prevención de morosidad y redacción de contratos, arrendamientos y desahucios, incapacidad y tutela, procedimientos hipotecarios, divorcios, separaciones, nulidades y asuntos paterno-filiales.
2. Derecho Mercantil-Societario: asesoría en consejos de administración, letrados para PYMES, libros de actas, procedimientos concursales, contratación mercantil, derecho bancario, defensa de consumidores y usuarios.
3. Derecho Laboral: despidos, juicios y sanciones laborales, EREs, negociaciones colectivas, reclamaciones de cantidad, permisos laborales.
4. Derecho Penal: penal económico, delitos de alcoholemia y circulación, violencia doméstica, lesiones, injurias y calumnias, delitos contra la salud pública, agresiones y abusos sexuales, propiedad intelectual e industrial, estafas, alzamiento de bienes.
5. Derecho Administrativo: recursos administrativos y contencioso-administrativos, asesoría integral en asuntos administrativos.
6. L.I.N.C.E. (Línea de Investigación Nacional y Crédito a Empresas): sistema exclusivo de MercaLex con 33.000+ empresas registradas. Permite verificar solvencia de compradores, anticipar impagos y recibir alertas de operaciones de alto riesgo comercial. Único en Mercamadrid. Acceso: https://lince.mercalexabogados.com/app_Login/

REGLAS ESTRICTAS:
1. SOLO responde sobre temas legales directamente relacionados con los servicios de MercaLex. Si te preguntan sobre cualquier otro tema, responde: "Eso está fuera de mi ámbito. Estoy aquí para orientarte en materia legal relacionada con los servicios de MercaLex."
2. Las respuestas deben ser concisas y al punto. Nunca des párrafos largos innecesarios. Si el tema requiere más profundidad, deriva a reunión.
3. NUNCA des precios, honorarios ni estimaciones económicas.
4. NUNCA inventes jurisprudencia, legislación ni datos del despacho.
5. Solo informa sobre servicios si te los preguntan directamente. No seas proactivo en el listado de servicios.
6. CONVERSIÓN A CITA: cuando hayas respondido la consulta principal del usuario, al final de tu respuesta ofrece siempre cerrar una reunión con el equipo para profundizar. Hazlo de forma natural, no agresiva: "Si quieres que lo analicemos en detalle, puedo agendarte una reunión con el equipo." Solo una vez por conversación.
7. Si el usuario acepta la reunión, responde exactamente con esta cadena y nada más: [OPEN_APPOINTMENT_MODAL]
8. Si preguntan por el acceso a L.I.N.C.E., facilita el enlace: https://lince.mercalexabogados.com/app_Login/
9. Fuentes exclusivamente oficiales: BOE, CGPJ, EUR-Lex, Tribunal Supremo, Tribunal Constitucional. Nunca Wikipedia ni fuentes no oficiales.
10. Detecta el idioma del usuario y responde en el mismo.
`,
          messages: messages.map(m => ({ role: m.role, content: m.content }))
        })
      });

      typingIndicator.classList.remove('active');

      if (!response.ok) {
        throw new Error('Error en la respuesta de la API');
      }

      const data = await response.json();
      let assistantMessage = data.content[0].text;

      // Handle appointment modal trigger
      if (assistantMessage.includes('[OPEN_APPOINTMENT_MODAL]')) {
        assistantMessage = assistantMessage.replace('[OPEN_APPOINTMENT_MODAL]', '').trim();
        if (assistantMessage) addMessage('assistant', assistantMessage);
        setTimeout(() => {
          window.dispatchEvent(new CustomEvent('openAppointmentModal'));
        }, 300);
        typingIndicator.classList.remove('active');
        return;
      }

      if (userMessageCount === 8) {
        assistantMessage += '\n\nSi necesitas más ayuda, puedo agendarte una consulta con nuestro equipo.';
      }

      addMessage('assistant', assistantMessage);

      if (userMessageCount >= 10) {
        showSessionComplete();
      }
    } catch (error) {
      typingIndicator.classList.remove('active');
      addMessage('assistant', 'Lo siento, ha ocurrido un error. Por favor, contacta directamente al +34 91 173 36 03 para asistencia inmediata.');
      console.error('Error:', error);
    }
  }

  function showSessionComplete() {
    input.disabled = true;
    input.placeholder = 'Sesión completada';
    sendBtn.disabled = true;

    const footer = chatWindow.querySelector('.lex-footer');
    footer.innerHTML = `
      <div class="lex-session-complete">
        <p>Has utilizado tu consulta gratuita con Lex IA.<br>Para continuar, reserva una cita con nuestro equipo.</p>
        <button class="lex-reserve-btn" id="lex-reserve-btn">Reservar cita</button>
      </div>
    `;

    const reserveBtn = document.getElementById('lex-reserve-btn');
    reserveBtn.addEventListener('click', () => {
      window.dispatchEvent(new CustomEvent('openAppointmentModal'));
    });
  }

  chatButton.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', toggleChat);
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  footerCall.addEventListener('click', () => {
    window.dispatchEvent(new CustomEvent('openAppointmentModal'));
  });
})();
</script></body>
</html>
